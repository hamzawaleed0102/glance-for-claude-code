<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="ca-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#63a2ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#63a2ff" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="ca-prog" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#63a2ff"/>
      <stop offset="100%" stop-color="#8ab4ff"/>
    </linearGradient>
  </defs>

  <rect width="720" height="280" fill="#07090c"/>

  <!-- Card (scaled 2.5x of real 314x86 → 540x148, centered) -->
  <g transform="translate(90, 64)">
    <rect width="540" height="148" rx="14" fill="url(#ca-card)" stroke="#63a2ff" stroke-opacity="0.75" stroke-width="1.8"/>
    <rect x="-3" y="-3" width="546" height="154" rx="16" fill="none" stroke="#63a2ff" stroke-opacity="0.18" stroke-width="5"/>
    <!-- Status stripe -->
    <rect x="0" y="0" width="8" height="148" fill="#63a2ff"/>
    <!-- Title -->
    <text x="30" y="38" fill="#ffffff" font-size="22" font-weight="700">refactor-auth</text>
    <!-- Model chip -->
    <rect x="218" y="20" width="72" height="24" rx="12" fill="#63a2ff" fill-opacity="0.15"/>
    <text x="254" y="37" fill="#63a2ff" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1">OPUS</text>
    <!-- Status dot -->
    <circle cx="514" cy="74" r="8" fill="#63a2ff"/>
    <circle cx="514" cy="74" r="14" fill="#63a2ff" fill-opacity="0.18"/>
    <!-- Kill button -->
    <circle cx="514" cy="20" r="13" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <path d="M 509 15 L 519 25 M 519 15 L 509 25" stroke="#858585" stroke-width="1.6" stroke-linecap="round"/>
    <!-- TLDR -->
    <text x="30" y="72" fill="#cccccc" font-size="19">Refactoring login middleware…</text>
    <!-- Progress bar -->
    <rect x="30" y="96" width="460" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="30" y="96" width="290" height="6" rx="3" fill="url(#ca-prog)"/>
    <text x="30" y="126" fill="#858585" font-size="17" font-style="italic">migrating tests · 63%</text>
  </g>
</svg>
