<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="dd-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>
  </defs>

  <rect width="920" height="360" fill="#07090c"/>

  <!-- LEFT: idle list -->
  <g transform="translate(60, 40)">
    <!-- Card 1 -->
    <g>
      <rect width="340" height="74" rx="8" fill="url(#dd-card)" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="0" y="0" width="3" height="74" fill="#4ade80"/>
      <text x="20" y="26" fill="#cccccc" font-size="14" font-weight="600">deploy-staging</text>
      <text x="20" y="50" fill="#858585" font-size="12">Tests pass</text>
    </g>
    <!-- Card 2 (handle visible) -->
    <g transform="translate(0, 90)">
      <rect width="340" height="74" rx="8" fill="url(#dd-card)" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="0" y="0" width="3" height="74" fill="rgba(255,255,255,0.10)"/>
      <text x="20" y="26" fill="#cccccc" font-size="14" font-weight="600">refactor-auth</text>
      <text x="20" y="50" fill="#858585" font-size="12">Idle</text>
      <g transform="translate(312, 32)" fill="#858585">
        <circle cx="0" cy="0" r="1.4"/><circle cx="6" cy="0" r="1.4"/>
        <circle cx="0" cy="6" r="1.4"/><circle cx="6" cy="6" r="1.4"/>
        <circle cx="0" cy="12" r="1.4"/><circle cx="6" cy="12" r="1.4"/>
      </g>
    </g>
    <!-- Card 3 -->
    <g transform="translate(0, 180)">
      <rect width="340" height="74" rx="8" fill="url(#dd-card)" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="0" y="0" width="3" height="74" fill="#cca700"/>
      <text x="20" y="26" fill="#cccccc" font-size="14" font-weight="600">fix-tests</text>
      <text x="20" y="50" fill="#cca700" font-size="12">⚠ Approve push?</text>
    </g>
  </g>

  <!-- RIGHT: dragging mid-action -->
  <g transform="translate(520, 40)">
    <!-- Top: deploy-staging unchanged -->
    <g>
      <rect width="340" height="74" rx="8" fill="url(#dd-card)" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="0" y="0" width="3" height="74" fill="#4ade80"/>
      <text x="20" y="26" fill="#cccccc" font-size="14" font-weight="600">deploy-staging</text>
      <text x="20" y="50" fill="#858585" font-size="12">Tests pass</text>
    </g>

    <!-- Drop target — fix-tests sliding up, accent stripe on top edge -->
    <g transform="translate(0, 90)">
      <rect width="340" height="74" rx="8" fill="url(#dd-card)" stroke="#63a2ff" stroke-opacity="0.6" stroke-width="1.4"/>
      <rect x="0" y="-2" width="340" height="2" fill="#63a2ff"/>
      <rect x="0" y="0" width="6" height="74" fill="#63a2ff"/>
      <text x="20" y="26" fill="#cccccc" font-size="14" font-weight="600">fix-tests</text>
      <text x="20" y="50" fill="#cca700" font-size="12">⚠ Approve push?</text>
    </g>

    <!-- Floating dragged card (refactor-auth) with shadow & opacity -->
    <g transform="translate(40, 200)" opacity="0.55">
      <rect x="-2" y="-2" width="344" height="78" rx="9" fill="#000000" fill-opacity="0.45"/>
      <rect width="340" height="74" rx="8" fill="url(#dd-card)" stroke="#63a2ff" stroke-opacity="0.4"/>
      <rect x="0" y="0" width="3" height="74" fill="rgba(255,255,255,0.10)"/>
      <text x="20" y="26" fill="#cccccc" font-size="14" font-weight="600">refactor-auth</text>
      <text x="20" y="50" fill="#858585" font-size="12">Idle</text>
    </g>

    <!-- Cursor -->
    <g transform="translate(48, 222)">
      <path d="M 0 0 L 16 6 L 7 8 L 11 18 L 7 20 L 3 10 L -3 12 Z" fill="#ffffff" stroke="#000000" stroke-width="0.6"/>
    </g>
  </g>
</svg>
