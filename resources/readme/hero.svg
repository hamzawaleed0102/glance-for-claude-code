<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="card-active" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#63a2ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#63a2ff" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#63a2ff"/>
      <stop offset="100%" stop-color="#8ab4ff"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6cf0"/>
      <stop offset="100%" stop-color="#1b54c8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Window frame -->
  <rect x="0" y="0" width="1280" height="760" rx="14" fill="#1e1e1e"/>
  <rect x="0" y="0" width="1280" height="40" rx="14" fill="#252526"/>
  <rect x="0" y="26" width="1280" height="14" fill="#252526"/>
  <!-- Traffic lights -->
  <circle cx="22" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="20" r="6" fill="#febc2e"/>
  <circle cx="62" cy="20" r="6" fill="#28c840"/>
  <text x="640" y="25" fill="#cccccc" font-size="11" text-anchor="middle" opacity="0.7">glancer-vscode — Visual Studio Code</text>

  <!-- Activity bar -->
  <rect x="0" y="40" width="52" height="720" fill="#181818"/>
  <!-- Glance icon (active panel — muted gray stroke, white active stripe per VS Code) -->
  <rect x="0" y="60" width="3" height="40" fill="#ffffff"/>
  <g transform="translate(14, 70)" stroke="#c5c5c5" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2.5" y="10.5" width="8" height="8" rx="2.8"/>
    <rect x="13.5" y="10.5" width="8" height="8" rx="2.8"/>
    <path d="M 10.5 13 Q 12 14.5 13.5 13"/>
    <path d="M 3 11.5 L 1.2 9.5"/>
    <path d="M 21 11.5 L 22.8 9.5"/>
  </g>
  <!-- Numeric badge — VS Code's standard activity-bar count badge -->
  <circle cx="38" cy="68" r="8" fill="#cca700"/>
  <text x="38" y="71.5" fill="#0d1117" font-size="10" font-weight="700" text-anchor="middle">1</text>

  <!-- Other activity bar icons (dimmed) -->
  <g fill="none" stroke="#858585" stroke-width="1.5" opacity="0.6">
    <rect x="16" y="118" width="20" height="20" rx="2"/>
    <circle cx="26" cy="162" r="9"/>
    <path d="M 16 200 L 36 200 M 16 206 L 36 206 M 16 212 L 36 212"/>
    <rect x="16" y="240" width="20" height="20" rx="2"/>
    <circle cx="26" cy="290" r="9"/>
  </g>

  <!-- Sidebar -->
  <rect x="52" y="40" width="338" height="720" fill="#07090c"/>

  <!-- Panel header -->
  <text x="72" y="68" fill="#cccccc" font-size="12" font-weight="600">AGENTS</text>
  <text x="125" y="68" fill="#858585" font-size="12" font-weight="600">3</text>
  <!-- Header actions -->
  <g fill="none" stroke="#858585" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 340 60 L 350 60 M 345 55 L 345 65" opacity="0.85"/>
    <rect x="358" y="55" width="10" height="10" rx="2" opacity="0.7"/>
  </g>
  <line x1="52" y1="82" x2="390" y2="82" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Card 1: streaming, active -->
  <g transform="translate(64, 96)">
    <rect width="314" height="86" rx="8" fill="url(#card-active)" stroke="#63a2ff" stroke-opacity="0.75"/>
    <rect width="314" height="86" rx="8" fill="none" stroke="#63a2ff" stroke-opacity="0.55"/>
    <rect x="-2" y="-2" width="318" height="90" rx="9" fill="none" stroke="#63a2ff" stroke-opacity="0.18" stroke-width="3"/>
    <!-- Active stripe -->
    <rect x="0" y="0" width="5" height="86" fill="#63a2ff"/>
    <!-- Title row -->
    <text x="18" y="22" fill="#ffffff" font-size="13" font-weight="700">refactor-auth</text>
    <rect x="125" y="11" width="42" height="14" rx="7" fill="#63a2ff" fill-opacity="0.15"/>
    <text x="146" y="21" fill="#63a2ff" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">OPUS</text>
    <!-- Pulsing status dot -->
    <circle cx="298" cy="43" r="5" fill="#63a2ff"/>
    <circle cx="298" cy="43" r="9" fill="#63a2ff" fill-opacity="0.18"/>
    <!-- TLDR -->
    <text x="18" y="42" fill="#cccccc" font-size="11.5">Refactoring login middleware to use the new token store</text>
    <!-- Progress -->
    <rect x="18" y="58" width="270" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="18" y="58" width="170" height="3" rx="1.5" fill="url(#progress)"/>
    <text x="18" y="76" fill="#858585" font-size="10" font-style="italic">migrating tests · 63%</text>
  </g>

  <!-- Card 2: needs input -->
  <g transform="translate(64, 196)">
    <rect width="314" height="86" rx="8" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- Attention stripe -->
    <rect x="0" y="0" width="3" height="86" fill="#cca700"/>
    <text x="18" y="22" fill="#cccccc" font-size="13" font-weight="600">deploy-staging</text>
    <rect x="135" y="11" width="48" height="14" rx="7" fill="#63a2ff" fill-opacity="0.15"/>
    <text x="159" y="21" fill="#63a2ff" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">SONNET</text>
    <!-- Attention dot -->
    <circle cx="298" cy="43" r="5" fill="#cca700"/>
    <circle cx="298" cy="43" r="9" fill="#cca700" fill-opacity="0.18"/>
    <text x="18" y="44" fill="#cca700" font-size="11.5" font-weight="500">⚠ Approve deploy to production?</text>
  </g>

  <!-- Card 3: done -->
  <g transform="translate(64, 296)">
    <rect width="314" height="86" rx="8" fill="url(#card-bg)" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="0" y="0" width="3" height="86" fill="#4ade80"/>
    <text x="18" y="22" fill="#cccccc" font-size="13" font-weight="600">fix-jsonl-parse</text>
    <rect x="138" y="11" width="42" height="14" rx="7" fill="#63a2ff" fill-opacity="0.15"/>
    <text x="159" y="21" fill="#63a2ff" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">OPUS</text>
    <!-- Done check -->
    <circle cx="298" cy="43" r="7" fill="#4ade80"/>
    <path d="M 295 43 L 297.5 45.5 L 301 41.5" stroke="#0d1117" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="44" fill="#858585" font-size="11.5">Hardened sanitization, all tests green</text>
  </g>

  <!-- New Session button -->
  <g transform="translate(64, 700)">
    <rect width="280" height="36" rx="6" fill="url(#btn)" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="140" y="23" fill="#ffffff" font-size="12.5" font-weight="600" text-anchor="middle">+ New Session</text>
    <line x1="248" y1="6" x2="248" y2="30" stroke="#ffffff" stroke-opacity="0.18"/>
    <path d="M 260 16 L 266 22 L 272 16" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Editor / terminal area -->
  <rect x="390" y="40" width="890" height="430" fill="#1e1e1e"/>
  <rect x="390" y="40" width="890" height="32" fill="#252526"/>
  <rect x="396" y="46" width="160" height="22" rx="3" fill="#1e1e1e"/>
  <text x="408" y="60" fill="#cccccc" font-size="11">refactor-auth — Claude Code</text>
  <!-- File body placeholder -->
  <g fill="#858585" font-size="11" font-family="'SF Mono', Menlo, monospace">
    <text x="410" y="100" fill="#569cd6">export async function</text>
    <text x="557" y="100" fill="#dcdcaa">authenticateUser</text>
    <text x="668" y="100" fill="#dcdcaa">(req</text>
    <text x="697" y="100" fill="#cccccc">: Request) {</text>
    <text x="426" y="122" fill="#c586c0">const</text>
    <text x="464" y="122" fill="#9cdcfe">token</text>
    <text x="503" y="122" fill="#cccccc">= req.headers.get(</text>
    <text x="625" y="122" fill="#ce9178">'authorization'</text>
    <text x="722" y="122" fill="#cccccc">);</text>
    <text x="426" y="144" fill="#c586c0">if</text>
    <text x="446" y="144" fill="#cccccc">(!token) </text>
    <text x="504" y="144" fill="#c586c0">throw new</text>
    <text x="566" y="144" fill="#4ec9b0">Unauthorized</text>
    <text x="649" y="144" fill="#cccccc">();</text>
    <text x="426" y="166" fill="#c586c0">return</text>
    <text x="466" y="166" fill="#dcdcaa">store</text>
    <text x="501" y="166" fill="#cccccc">.verify(token);</text>
    <text x="410" y="188" fill="#cccccc">}</text>
  </g>

  <!-- Terminal -->
  <rect x="390" y="470" width="890" height="290" fill="#0a0a0a"/>
  <rect x="390" y="470" width="890" height="28" fill="#252526"/>
  <text x="410" y="488" fill="#cccccc" font-size="11">TERMINAL · refactor-auth</text>
  <circle cx="380" cy="484" r="3" fill="#63a2ff" opacity="0"/>
  <g fill="#cccccc" font-size="11" font-family="'SF Mono', Menlo, monospace">
    <text x="410" y="518" fill="#4ade80">●</text>
    <text x="422" y="518">Claude Code v2.0.42</text>
    <text x="410" y="540" fill="#858585">› refactor login middleware to use the new token store</text>
    <text x="410" y="566" fill="#cccccc">I'll start by reading the current middleware and the new store interface.</text>
    <text x="410" y="588" fill="#858585">⏺</text>
    <text x="424" y="588" fill="#cccccc">Read(src/auth/middleware.ts)</text>
    <text x="410" y="610" fill="#858585">⏺</text>
    <text x="424" y="610" fill="#cccccc">Read(src/store/tokens.ts)</text>
    <text x="410" y="632" fill="#858585">⏺</text>
    <text x="424" y="632" fill="#cccccc">Edit(src/auth/middleware.ts)</text>
    <text x="410" y="654" fill="#cccccc">Now migrating the test suite to mock the new store…</text>
    <text x="410" y="676" fill="#63a2ff">›</text>
    <rect x="420" y="666" width="7" height="14" fill="#cccccc">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
