<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="nt-btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e639c"/>
      <stop offset="100%" stop-color="#0a4d7a"/>
    </linearGradient>
    <filter id="nt-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Editor backdrop -->
  <rect width="720" height="400" fill="#1e1e1e"/>

  <!-- Status bar at bottom -->
  <rect x="0" y="378" width="720" height="22" fill="#007acc"/>
  <text x="14" y="393" fill="#ffffff" font-size="11">main</text>
  <text x="60" y="393" fill="#ffffff" font-size="11" opacity="0.85">UTF-8</text>
  <text x="110" y="393" fill="#ffffff" font-size="11" opacity="0.85">TypeScript</text>

  <!-- File content placeholder -->
  <g font-family="'SF Mono', Menlo, monospace" font-size="11" opacity="0.65">
    <text x="30" y="40" fill="#569cd6">import</text>
    <text x="78" y="40" fill="#cccccc">{ Agent }</text>
    <text x="142" y="40" fill="#569cd6">from</text>
    <text x="180" y="40" fill="#ce9178">'./Agent'</text>
    <text x="240" y="40" fill="#cccccc">;</text>

    <text x="30" y="68" fill="#c586c0">export class</text>
    <text x="115" y="68" fill="#4ec9b0">AgentManager</text>
    <text x="210" y="68" fill="#cccccc">{</text>

    <text x="46" y="92" fill="#9cdcfe">private</text>
    <text x="100" y="92" fill="#9cdcfe">agents</text>
    <text x="148" y="92" fill="#cccccc">=</text>
    <text x="160" y="92" fill="#569cd6">new</text>
    <text x="190" y="92" fill="#4ec9b0">Map</text>
    <text x="218" y="92" fill="#cccccc">();</text>

    <text x="46" y="120" fill="#dcdcaa">spawnAgent</text>
    <text x="118" y="120" fill="#cccccc">(opts) {</text>

    <text x="62" y="148" fill="#6a9955">// kick off the pty + watcher pair</text>

    <text x="62" y="172" fill="#c586c0">const</text>
    <text x="100" y="172" fill="#9cdcfe">agent</text>
    <text x="140" y="172" fill="#cccccc">=</text>
    <text x="152" y="172" fill="#569cd6">new</text>
    <text x="182" y="172" fill="#4ec9b0">Agent</text>
    <text x="220" y="172" fill="#cccccc">(opts);</text>

    <text x="62" y="196" fill="#9cdcfe">agent</text>
    <text x="100" y="196" fill="#cccccc">.start();</text>
  </g>

  <!-- Toast notification (bottom-right) -->
  <g transform="translate(296, 220)" filter="url(#nt-shadow)">
    <!-- Toast body -->
    <rect width="404" height="118" rx="2" fill="#252526" stroke="#454545" stroke-width="1"/>

    <!-- Left blue info accent -->
    <rect x="0" y="0" width="2" height="118" fill="#007acc"/>

    <!-- Info icon (circle with i) -->
    <circle cx="22" cy="26" r="8" fill="none" stroke="#75beff" stroke-width="1.4"/>
    <circle cx="22" cy="22" r="1.1" fill="#75beff"/>
    <rect x="21.2" y="25" width="1.6" height="6.2" fill="#75beff"/>

    <!-- Title / body text -->
    <text x="40" y="22" fill="#cccccc" font-size="12">
      <tspan font-weight="700">deploy-staging</tspan>
      <tspan fill="#858585"> — Approve deploy to production?</tspan>
    </text>
    <text x="40" y="42" fill="#858585" font-size="11">Source: Glance for Claude Code</text>

    <!-- Close X -->
    <g transform="translate(382, 12)">
      <path d="M 0 0 L 10 10 M 10 0 L 0 10" stroke="#858585" stroke-width="1.4" stroke-linecap="round"/>
    </g>

    <!-- Buttons -->
    <g transform="translate(310, 76)">
      <rect width="78" height="26" rx="2" fill="url(#nt-btn)" stroke="#1a8ad6" stroke-opacity="0.5"/>
      <text x="39" y="17" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">Show</text>
    </g>
  </g>
</svg>
